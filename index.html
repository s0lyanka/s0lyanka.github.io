<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мировое Время</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="interface-container" id="clock-card">
        <div class="clock-content">
            <div class="location-box">
                <span id="city-emoji" class="emoji">🏙️</span>
                <h1 id="city-name">Москва</h1>
            </div>
            
            <div class="time-display" id="time-string">00:00:00</div>
            <div class="date-display" id="date-string">Понедельник, 1 января</div>
            <div class="timezone-badge" id="timezone-offset">UTC+3</div>
            
            <button id="next-city-btn">Сменить город 🌍</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
